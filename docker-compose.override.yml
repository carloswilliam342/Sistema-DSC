services:
  app:
    environment:
      DB_HOST: db
      DB_USER: ${DB_APP_USER:-dsc_app}
      DB_PASSWORD: ${DB_APP_PASSWORD:-app_password}
      REDIS_HOST: redis
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    environment:
      DB_HOST: db
      DB_USER: ${DB_MIGRATE_USER:-dsc_migrate}
      DB_PASSWORD: ${DB_MIGRATE_PASSWORD:-migrate_password}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-dsc_ifma}
      DB_APP_USER: ${DB_APP_USER:-dsc_app}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD:-app_password}
      DB_MIGRATE_USER: ${DB_MIGRATE_USER:-dsc_migrate}
      DB_MIGRATE_PASSWORD: ${DB_MIGRATE_PASSWORD:-migrate_password}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  minio_data:
