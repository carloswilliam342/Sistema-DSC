services:
  app:
    environment:
      DB_HOST: ${DB_HOST}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NODE_ENV: production
    # redis-sessions roda numa rede macvlan própria (IP de LAN direto), separada
    # da rede padrão do compose. Sem estar conectado nela também, o app não tem
    # rota pra alcançar 10.99.95.25 (dá EHOSTUNREACH).
    networks:
      - default

  migrate:
    environment:
      DB_HOST: ${DB_HOST}

